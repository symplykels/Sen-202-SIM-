<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIM - Security Incident Mapping</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --accent: #f59e0b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border: #334155;
            --danger: #dc2626;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            padding: 20px;
        }

        header {
            margin-bottom: 30px;
            text-align: center;
        }

        header h1 {
            font-size: 1.8rem;
            color: var(--text-main);
            margin-bottom: 5px;
        }

        header p {
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
        }

        .card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--text-muted);
        }

        select, input, textarea {
            width: 100%;
            padding: 12px;
            background: var(--bg-color);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-main);
            font-size: 1rem;
        }

        select:focus, input:focus, textarea:focus {
            outline: none;
            border-color: var(--accent);
        }

        button {
            width: 100%;
            padding: 14px;
            background: var(--accent);
            border: none;
            border-radius: 8px;
            color: #0f172a;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        button:hover {
            opacity: 0.9;
        }

        .incident-item {
            background: var(--bg-color);
            border-left: 4px solid var(--danger);
            padding: 15px;
            border-radius: 4px;
            margin-top: 10px;
        }

        .incident-item h4 {
            margin-bottom: 5px;
            font-size: 1rem;
        }

        .incident-item p {
            font-size: 0.85rem;
            color: var(--text-muted);
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>SIM Prototype</h1>
            <p>Security Incident Mapping & Community Safety Hub</p>
        </header>

        <div class="card">
            <h3 style="margin-bottom: 15px;">Report an Incident</h3>
            <form id="incidentForm">
                <div class="form-group">
                    <label for="incidentType">Incident Type</label>
                    <select id="incidentType" required>
                        <option value="">-- Select Type --</option>
                        <option value="Theft/Stealing">Theft / Stealing</option>
                        <option value="Physical Assault/Stabbing">Physical Assault / Stabbing</option>
                        <option value="Sexual Assault">Sexual Assault</option>
                        <option value="Other Safety Threat">Other Safety Threat</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="location">Location / Area</label>
                    <input type="text" id="location" placeholder="e.g., Near Campus Gate, Campus Area" required>
                </div>

                <div class="form-group">
                    <label for="details">Additional Details</label>
                    <textarea id="details" rows="3" placeholder="Describe the situation briefly..."></textarea>
                </div>

                <button type="submit">Submit Anonymous Report</button>
            </form>
        </div>

        <div class="card">
            <h3 style="margin-bottom: 10px;">Recent Localized Logs</h3>
            <div id="incidentFeed"></div>
        </div>
    </div>

   <script>
        const incidentForm = document.getElementById('incidentForm');
        const incidentFeed = document.getElementById('incidentFeed');

        let incidents = JSON.parse(localStorage.getItem('sim_incidents')) || [
            { id: 'SIM-1042', type: 'Theft/Stealing', location: 'Main Campus Quad', details: 'Phone snatched while walking around evening hours.', time: 'Recent' },
            { id: 'SIM-1041', type: 'Physical Assault/Stabbing', location: 'Perimeter Boundary Road', details: 'Aggressive encounter reported near dark zone.', time: '1 day ago' }
        ];

        function renderIncidents() {
            incidentFeed.innerHTML = '';
            if (incidents.length === 0) {
                incidentFeed.innerHTML = '<p style="color: var(--text-muted); font-size: 0.9rem;">No threats currently flagged.</p>';
                return;
            }
            incidents.forEach(item => {
                const div = document.createElement('div');
                div.className = 'incident-item';
                div.innerHTML = `
                    <h4>${item.type} <span style="color: var(--accent); font-size: 0.8rem; float: right;">${item.id}</span></h4>
                    <p><strong>Location:</strong> ${item.location}</p>
                    <p>${item.details || 'No details provided.'}</p>
                    <p style="font-size: 0.75rem; margin-top: 5px; color: var(--text-muted);">Logged: ${item.time}</p>
                `;
                incidentFeed.appendChild(div);
            });
        }

        incidentForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const type = document.getElementById('incidentType').value;
            const location = document.getElementById('location').value;
            const details = document.getElementById('details').value;
            
            const randomId = 'SIM-' + Math.floor(1000 + Math.random() * 9000);

            const newIncident = {
                id: randomId,
                type,
                location,
                details,
                time: 'Just Now'
            };

            incidents.unshift(newIncident);
            localStorage.setItem('sim_incidents', JSON.stringify(incidents));
            renderIncidents();
            incidentForm.reset();
            
            alert('Report submitted successfully! Your tracking reference number is: ' + randomId);
        });

        renderIncidents();
    </script>
</body>
</html>
